name: build-and-release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: alpha-release
  cancel-in-progress: false

jobs:
  meta:
    name: calc-next-alpha-tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: calc tag v0.1.x-alpha
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          LAST_PATCH="$(
            git ls-remote --tags origin \
              'refs/tags/v0.1.*-alpha' \
              | awk -F'/' '{print $3}' \
              | sed -n 's/^v0\.1\.\([0-9]\+\)-alpha$/\1/p' \
              | sort -n \
              | tail -1
          )"
          if [ -z "${LAST_PATCH}" ]; then
            LAST_PATCH=0
          fi
          NEXT_PATCH=$((LAST_PATCH + 1))
          TAG="v0.1.${NEXT_PATCH}-alpha"

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=true" >> "$GITHUB_OUTPUT"
          echo "next tag: ${TAG}"

  build:
    name: build-${{ matrix.target }}
    needs: meta
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          fi

      - name: build x86_64
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: build aarch64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: pack
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nginx-manager dist/nginx-manager
          tar -czf nginx-manager-linux-${{ matrix.arch }}.tar.gz -C dist nginx-manager

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: nginx-manager-${{ matrix.arch }}
          path: nginx-manager-linux-${{ matrix.arch }}.tar.gz

  create-tag:
    name: create-tag
    needs: meta
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: create and push tag
        env:
          TAG: ${{ needs.meta.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "tag exists: ${TAG}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

  release:
    name: release
    needs: [meta, build, create-tag]
    if: ${{ needs.build.result == 'success' && needs.create-tag.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: download x86_64
        uses: actions/download-artifact@v4
        with:
          name: nginx-manager-x86_64
          path: artifacts

      - name: download aarch64
        uses: actions/download-artifact@v4
        with:
          name: nginx-manager-aarch64
          path: artifacts

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          prerelease: ${{ needs.meta.outputs.prerelease }}
          make_latest: false
          generate_release_notes: true
          files: |
            artifacts/nginx-manager-linux-x86_64.tar.gz
            artifacts/nginx-manager-linux-aarch64.tar.gz
