name: 构建与发布

on:
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建 (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: x86_64
          - target: aarch64-unknown-linux-gnu
            arch: aarch64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          fi

      - name: 编译（x86_64）
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: 编译（aarch64）
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo build --release --target aarch64-unknown-linux-gnu

      - name: 打包产物
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nginx-manager dist/nginx-manager
          tar -czf nginx-manager-linux-${{ matrix.arch }}.tar.gz -C dist nginx-manager

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: nginx-manager-${{ matrix.arch }}
          path: nginx-manager-linux-${{ matrix.arch }}.tar.gz

  release:
    name: 发布 Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: 下载 x86_64 产物
        uses: actions/download-artifact@v4
        with:
          name: nginx-manager-x86_64
          path: artifacts

      - name: 下载 aarch64 产物
        uses: actions/download-artifact@v4
        with:
          name: nginx-manager-aarch64
          path: artifacts

      - name: 创建并上传 Release 资产
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/nginx-manager-linux-x86_64.tar.gz
            artifacts/nginx-manager-linux-aarch64.tar.gz
